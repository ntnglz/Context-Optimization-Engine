name: Benchmark nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  nightly-mock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Nightly tier — single_turn cases (mock evaluator, no Ollama in CI)
        run: |
          python scripts/benchmark/run.py --tier nightly --profile n1 --evaluator mock

      - name: Multilingual subset (n1_es)
        run: |
          python scripts/benchmark/run.py --tier nightly --profile n1_es \
            --tags multilingual --evaluator mock

      - name: Multi-turn N5 session (mock)
        run: |
          python scripts/benchmark/run.py --tier smoke --profile n5_session \
            --tags multi_turn --evaluator mock \
            --compare-baseline data/benchmarks/baselines/n5_session_smoke.json

  nightly-ollama:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 3
          ollama pull "${OLLAMA_MODEL:-qwen3:8b}"

      - name: Nightly E2E with Ollama (manual dispatch only)
        env:
          OLLAMA_MODEL: qwen3:8b
        run: |
          python scripts/benchmark/run.py --tier nightly --profile n1 \
            --evaluator "ollama:${OLLAMA_MODEL}"
