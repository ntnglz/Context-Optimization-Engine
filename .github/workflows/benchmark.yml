name: Benchmark smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests (capa 0)
        run: python -m pytest tests/ -q

      - name: Benchmark smoke n1 + baseline compare
        run: |
          python scripts/benchmark/run.py --tier smoke --profile n1 \
            --compare-baseline data/benchmarks/baselines/n1_smoke.json

      - name: Benchmark smoke n1_n2_en + baseline compare
        run: |
          python scripts/benchmark/run.py --tier smoke --profile n1_n2_en \
            --compare-baseline data/benchmarks/baselines/n1_n2_en_smoke.json

      - name: Benchmark smoke n1_n2_es (multilingual) + baseline compare
        run: |
          python scripts/benchmark/run.py --tier smoke --profile n1_n2_es \
            --tags multilingual \
            --compare-baseline data/benchmarks/baselines/n1_n2_es_smoke.json

      - name: Benchmark smoke l0_n1_en (multilingual) + baseline compare
        run: |
          python scripts/benchmark/run.py --tier smoke --profile l0_n1_en \
            --tags multilingual \
            --compare-baseline data/benchmarks/baselines/l0_n1_en_smoke.json

      - name: Benchmark smoke n5_session (multi_turn) + baseline compare
        run: |
          python scripts/benchmark/run.py --tier smoke --profile n5_session \
            --tags multi_turn \
            --compare-baseline data/benchmarks/baselines/n5_session_smoke.json

      - name: Benchmark smoke n1_n2_n3_en + baseline compare
        run: |
          python scripts/benchmark/run.py --tier smoke --profile n1_n2_n3_en \
            --compare-baseline data/benchmarks/baselines/n1_n2_n3_en_smoke.json
